<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Praxis — Practica entrevistas técnicas con una IA entrevistadora y recibe un reporte con tu puntaje."
    />
    <title>Praxis — Entrevistas técnicas con IA</title>
    <script>
      (function () {
        try {
          var g = localStorage.getItem('praxis_tema');
          var oscuro =
            g === 'dark' ||
            (g === null && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', oscuro ? 'dark' : 'light');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
